<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sala de Sinais Forex 1min</title>
<style>
body { background:#0f172a; color:white; font-family:Arial, sans-serif; text-align:center; }
h1 { margin:20px; }
.card { background:#1e293b; padding:20px; border-radius:15px; margin:20px auto; max-width:450px; }
.sinal { font-size:24px; margin:10px 0; }
.call { color:#00ff88; }
.put { color:#ff3b3b; }
.signal-info { font-size:14px; margin-top:10px; line-height:1.4; white-space:pre-line; }
.history { text-align:left; font-size:12px; margin-top:10px; max-height:120px; overflow-y:auto; background:#111827; padding:5px; border-radius:8px; }
.history span.call { color:#00ff88; }
.history span.put { color:#ff3b3b; }
.best { background:#00ff88; color:#0f172a; font-weight:bold; padding:10px; border-radius:12px; margin-top:15px; }
.btn { margin-top:10px; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-size:16px; background:#00aaff; color:white; }
.btn:hover { opacity:0.8; }
</style>
</head>
<body>

<h1>🔥 Sala de Sinais Forex 1min</h1>
<div id="cards-container"></div>

<script>
const API_KEY = "b7a8442395824a299190dc6f20845d6a"; // Troque pela sua chave real
const ativos = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","NZD/USD","EUR/GBP","EUR/JPY"];
const melhorSinais = {};

// Função de alerta sonoro
function tocarSom(){
    const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
    audio.play();
}

// SMA simples
function sma(values){ return values.reduce((a,b)=>a+b,0)/values.length; }

// RSI simples
function rsi(values, period=14){
    if(values.length < period+1) return 50;
    let gains=0, losses=0;
    for(let i=1;i<=period;i++){
        const d = values[i]-values[i-1];
        if(d>0) gains+=d;
        else losses-=d;
    }
    if(gains+losses===0) return 50;
    return 100-(100/(1+gains/losses));
}

// Tendência simples
function analisarTendencia(closes){
    const c0=closes[closes.length-1], c1=closes[closes.length-2], c2=closes[closes.length-3];
    if(c0>c1 && c1>c2) return "CALL";
    if(c0<c1 && c1<c2) return "PUT";
    return c0>c1?"CALL":"PUT";
}

// Combinar indicadores simples
function combinarIndicadores(closes){
    const tend = analisarTendencia(closes);
    const media = sma(closes);
    const r = rsi(closes);
    let score = 0;
    score += (tend==="CALL")?1:-1;
    score += (closes[closes.length-1]>media)?1:-1;
    const sinalFinal = score>=0?"CALL":"PUT";
    return { sinal:sinalFinal, media:media.toFixed(4), rsi:r.toFixed(2), confianca:Math.min(Math.abs(score),2) };
}

// Criar cards
function criarCards(){
    const container=document.getElementById("cards-container");
    container.innerHTML="";
    ativos.forEach(ativo=>{
        const idPrefix=ativo.replace("/","");
        const card=document.createElement("div");
        card.className="card";
        card.id=`card_${idPrefix}`;
        card.innerHTML=`
            <h3>${ativo}</h3>
            <div id="${idPrefix}_1min" class="sinal">---</div>
            <button class="btn" onclick="gerarSinal('${ativo}')">Gerar Sinal</button>
            <div id="melhor_${idPrefix}" class="best">Sinal: ---</div>
            <div id="history_${idPrefix}" class="history"></div>
        `;
        container.appendChild(card);
    });
}

// Gerar sinal manual
async function gerarSinal(ativo){
    const idPrefix=ativo.replace("/","");
    try{
        const url=`https://api.twelvedata.com/time_series?symbol=${ativo}&interval=1min&outputsize=20&apikey=${API_KEY}`;
        const res=await fetch(url);
        const data=await res.json();
        if(!data.values || data.values.length<3){
            alert("Dados insuficientes para gerar sinal.");
            return;
        }
        const closes = data.values.map(c=>parseFloat(c.close)).reverse();
        const ind = combinarIndicadores(closes);

        // Atualiza card
        const elem=document.getElementById(`${idPrefix}_1min`);
        elem.className="sinal "+(ind.sinal==="CALL"?"call":"put");
        elem.innerText=`${ind.sinal} (1min)`;

        // Histórico e melhor sinal
        const melhor = melhorSinais[ativo];
        if(!melhor || melhor.sinal !== ind.sinal){
            tocarSom();
        }
        melhorSinais[ativo] = {...ind,tempo:"1min",entrada:new Date()};

        const hist=document.getElementById(`history_${idPrefix}`);
        const span=document.createElement("span"); span.className=ind.sinal.toLowerCase();
        span.innerText=`${new Date().toLocaleTimeString()} → ${ind.sinal}\n`; hist.prepend(span);

        document.getElementById(`melhor_${idPrefix}`).innerText=`Sinal: ${ind.sinal}`;
    }catch(err){
        console.error(err);
        alert("Erro ao buscar dados. Verifique sua API Key.");
    }
}

// Inicialização
criarCards();
</script>

</body>
</html>
