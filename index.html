<!DOCTYPE html>
<html>
<head>
  <title>Sinais Binários</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: #fff;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-top: 20px;
      cursor: pointer;
    }

    #resultado {
      font-size: 30px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>📊 Sinais Binários</h1>
<p>EUR/USD | EUR/JPY | GBP/USD | GBP/JPY</p>

<button onclick="gerarSinal()">Gerar Sinal</button>

<div id="resultado"></div>

<script>
function gerarSinal() {
    let pares = ["EUR/USD", "EUR/JPY", "GBP/USD", "GBP/JPY"];
    let tempos = ["M1", "M5"];
    let direcao = ["CALL (COMPRA)", "PUT (VENDA)"];

    let par = pares[Math.floor(Math.random() * pares.length)];
    let tempo = tempos[Math.floor(Math.random() * tempos.length)];
    let sinal = direcao[Math.floor(Math.random() * direcao.length)];

    document.getElementById("resultado").innerHTML =
        par + "<br>" + tempo + "<br>" + sinal;
}
</script>

</body>
</html>
