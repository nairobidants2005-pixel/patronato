<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Profissional Forex</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background-color: #f4f4f9; 
      margin: 0; 
      padding: 20px; 
      color: #333;
    }
    h1 { 
      text-align: center; 
      color: #2c3e50; 
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .input-group {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      gap: 10px;
    }
    input {
      padding: 8px;
      width: 150px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1em;
      text-transform: uppercase;
    }
    button {
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background-color: #3498db;
      color: white;
      cursor: pointer;
      font-size: 1em;
    }
    button:hover {
      background-color: #2980b9;
    }
    #dashboard {
      text-align: center;
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 25px;
    }
    .chart-container {
      position: relative;
      height: 300px;
      margin-bottom: 30px;
    }
    canvas {
      background: #f9f9f9;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>Dashboard Profissional de Sinais Forex</h1>
  <div class="container">
    <div class="input-group">
      <input type="text" id="symbol" placeholder="Ex: EURUSD" value="EURUSD">
      <button onclick="getSignal()">Obter Sinal</button>
    </div>
    <div id="dashboard">O sinal aparecerá aqui.</div>

    <div class="chart-container">
      <canvas id="priceChart"></canvas>
    </div>
    <div class="chart-container">
      <canvas id="indicatorChart"></canvas>
    </div>
  </div>

  <script>
    let priceChart, indicatorChart;

    async function getSignal() {
      const symbol = document.getElementById('symbol').value.toUpperCase();
      const dashboard = document.getElementById('dashboard');
      
      try {
        // Requisição de sinal
        const resSignal = await fetch(`http://localhost:8000/signal?symbol=${symbol}`);
        const dataSignal = await resSignal.json();

        // Atualiza dashboard com cores
        dashboard.innerHTML = `Par: ${dataSignal.symbol} | Sinal: ${dataSignal.signal}`;
        dashboard.style.color = dataSignal.signal === "CALL" ? "#27ae60" : "#e74c3c";

        // Requisição dos dados históricos (CSV convertido para JSON no backend)
        const resData = await fetch(`http://localhost:8000/data?symbol=${symbol}`);
        const data = await resData.json(); // espera: {labels: [], close: [], sma: [], ema: [], rsi: []}

        // Atualiza gráfico de preços
        const priceCtx = document.getElementById('priceChart').getContext('2d');
        if (priceChart) priceChart.destroy();
        priceChart = new Chart(priceCtx, {
          type: 'line',
          data: {
            labels: data.labels,
            datasets: [
              { label: 'Preço Close', data: data.close, borderColor: '#2980b9', fill: false },
              { label: 'SMA', data: data.sma, borderColor: '#f39c12', fill: false },
              { label: 'EMA', data: data.ema, borderColor: '#8e44ad', fill: false },
            ]
          },
          options: { responsive: true, plugins: { legend: { position: 'top' } } }
        });

        // Atualiza gráfico de indicadores
        const indicatorCtx = document.getElementById('indicatorChart').getContext('2d');
        if (indicatorChart) indicatorChart.destroy();
        indicatorChart = new Chart(indicatorCtx, {
          type: 'line',
          data: {
            labels: data.labels,
            datasets: [
              { label: 'RSI', data: data.rsi, borderColor: '#27ae60', fill: false },
              { label: 'MACD', data: data.macd, borderColor: '#c0392b', fill: false },
            ]
          },
          options: { responsive: true, plugins: { legend: { position: 'top' } } }
        });

      } catch (err) {
        console.error(err);
        dashboard.innerHTML = 'Erro ao obter sinais ou dados. Verifique o backend.';
        dashboard.style.color = '#e74c3c';
      }
    }
  </script>
</body>
</html>
