<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sala de Sinais EUR/USD Avançada</title>
<style>
  body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
  h1 { margin:20px; }
  .card { background:#1e293b; padding:20px; border-radius:15px; margin:20px auto; width:350px; }
  .sinal { font-size:28px; margin:10px 0; }
  .call { color:#00ff88; }
  .put { color:#ff3b3b; }
  .btn { margin-top:15px; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-size:16px; background:#00aaff; color:white; }
  .btn:hover { opacity:0.8; }
  .signal-info { font-size:16px; margin-top:10px; line-height:1.4; white-space:pre-line; }
</style>
</head>
<body>

<h1>🔥 Sala de Sinais EUR/USD Avançada</h1>

<div class="card">
  <h3>EUR/USD</h3>
  <div id="eurusd_m1" class="sinal">...</div>
  <div id="eurusd_m5" class="sinal">...</div>
  <div id="eurusd_m15" class="sinal">...</div>
  <button class="btn" onclick="gerarSinaisEURUSD()">Gerar Sinais</button>
  <div id="info_eurusd" class="signal-info"></div>
</div>

<script>
const API_KEY = "b7a8442395824a299190dc6f20845d6a";

// 🔔 Som
function tocarSom(){ const audio=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3"); audio.play(); }

// Média Móvel Simples
function sma(values){ return values.reduce((a,b)=>a+b,0)/values.length; }

// RSI Simplificado
function rsi(values){
  let gains=0, losses=0;
  for(let i=1;i<values.length;i++){
    let diff=values[i]-values[i-1];
    if(diff>0) gains+=diff;
    else losses-=diff;
  }
  if(gains+losses===0) return 50;
  return 100-(100/(1+gains/losses));
}

// MACD Simplificado: SMA rápida - SMA lenta
function macd(values,fast=3,slow=6){
  if(values.length<slow) return 0;
  const smaFast=sma(values.slice(0,fast));
  const smaSlow=sma(values.slice(0,slow));
  return smaFast-smaSlow;
}

// Tendência por candles
function analisarTendencia(closes){
  if(closes.length<3) return closes[0]>closes[1]?"CALL":"PUT";
  const [c0,c1,c2]=closes;
  if(c0>c1 && c1>c2) return "CALL";
  if(c0<c1 && c1<c2) return "PUT";
  return c0>c1?"CALL":"PUT";
}

// Combina indicadores para decidir CALL/PUT
function combinarIndicadores(closes){
  const tend=analisarTendencia(closes);
  const media=sma(closes);
  const r=rsi(closes);
  const m=macd(closes);

  let sinal=tend;

  // Filtros avançados
  if(tend==="CALL" && (closes[0]<media || r>70 || m<0)) sinal="PUT";
  if(tend==="PUT" && (closes[0]>media || r<30 || m>0)) sinal="CALL";

  return {sinal,media:r.toFixed(1),rsi:r.toFixed(1),macd:m.toFixed(4)};
}

// Gera sinais M1, M5, M15
async function gerarSinaisEURUSD(){
  const tempos = ["1min","5min","15min"];
  const ids = ["eurusd_m1","eurusd_m5","eurusd_m15"];
  let infoText="";

  for(let i=0;i<tempos.length;i++){
    const tempo=tempos[i];
    const id=ids[i];
    const elemento=document.getElementById(id);

    try{
      const url=`https://api.twelvedata.com/time_series?symbol=EUR/USD&interval=${tempo}&outputsize=6&apikey=${API_KEY}`;
      const res=await fetch(url);
      const data=await res.json();
      if(!data.values||data.values.length<3) continue;

      const closes=data.values.slice(0,6).map(c=>parseFloat(c.close));
      const ind=combinarIndicadores(closes);

      elemento.className="sinal "+(ind.sinal==="CALL"?"call":"put");
      elemento.innerText=`${ind.sinal} (${tempo})`;

      const agora=new Date();
      let entradaMin=tempo==="1min"?1:tempo==="5min"?5:15;
      const entrada=new Date(agora.getTime()+entradaMin*60000);
      const h=entrada.getHours().toString().padStart(2,"0");
      const m=entrada.getMinutes().toString().padStart(2,"0");

      infoText+=`${tempo.toUpperCase()} → ${ind.sinal} às ${h}:${m} | SMA:${ind.media} RSI:${ind.rsi} MACD:${ind.macd}\n`;

    }catch(err){ console.error("Erro gerar sinal:",err); }
  }

  document.getElementById("info_eurusd").innerText=infoText;
  tocarSom();
}
</script>

</body>
</html>
