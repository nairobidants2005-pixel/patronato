<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sala de Sinais EUR/USD Inteligente - Multi-Timeframe</title>
<style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
h1 { margin:20px; }
.card { background:#1e293b; padding:20px; border-radius:15px; margin:20px auto; width:400px; }
.sinal { font-size:28px; margin:10px 0; }
.call { color:#00ff88; }
.put { color:#ff3b3b; }
.btn { margin-top:15px; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-size:16px; background:#00aaff; color:white; }
.btn:hover { opacity:0.8; }
.signal-info { font-size:16px; margin-top:10px; line-height:1.4; white-space:pre-line; }
.best { background:#00ff88; color:#0f172a; font-weight:bold; padding:10px; border-radius:12px; margin-top:15px; }
</style>
</head>
<body>

<h1>🔥 Sala de Sinais EUR/USD Inteligente - Multi-Timeframe</h1>

<div class="card">
  <h3>EUR/USD</h3>
  <div id="eurusd_m1" class="sinal">...</div>
  <div id="eurusd_m5" class="sinal">...</div>
  <div id="eurusd_m15" class="sinal">...</div>
  <button class="btn" onclick="gerarSinaisEURUSD()">Atualizar Sinais</button>
  <div id="info_eurusd" class="signal-info"></div>
  <div id="melhor_timeframe" class="best">Melhor sinal sincronizado: ...</div>
  <div id="timer_entrada" class="signal-info"></div>
</div>

<script>
const API_KEY = "b7a8442395824a299190dc6f20845d6a";
const tempos = ["1min","5min","15min"];
const ids = ["eurusd_m1","eurusd_m5","eurusd_m15"];
let melhorSinalAtual = null;

// Som
function tocarSom(){
  const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}

// SMA
function sma(values){ return values.reduce((a,b)=>a+b,0)/values.length; }
// EMA
function ema(values, period){
  const k = 2/(period+1);
  let emaPrev = values[0];
  for(let i=1;i<values.length;i++){ emaPrev = values[i]*k + emaPrev*(1-k); }
  return emaPrev;
}
// RSI
function rsi(values, period=14){
  if(values.length < period+1) return 50;
  let gains=0, losses=0;
  for(let i=1;i<=period;i++){
    const diff = values[i]-values[i-1];
    if(diff>0) gains+=diff; else losses-=diff;
  }
  if(gains+losses===0) return 50;
  return 100-(100/(1+gains/losses));
}
// MACD
function macd(values, fast=12, slow=26){
  if(values.length<slow) return 0;
  return ema(values.slice(-fast), fast)-ema(values.slice(-slow), slow);
}
// Bollinger Bands
function bollinger(values, period=20, desv=2){
  if(values.length<period) return {upper:0, lower:0, middle:0};
  const subset = values.slice(-period);
  const m = sma(subset);
  const std = Math.sqrt(subset.reduce((acc,v)=>acc+(v-m)**2,0)/period);
  return {middle:m, upper:m+desv*std, lower:m-desv*std};
}
// ADX
function adx(candles, period=14){
  if(candles.length<=period) return 0;
  let trSum=0, plusDMsum=0, minusDMsum=0;
  for(let i=1;i<=period;i++){
    const high=parseFloat(candles[i].high);
    const low=parseFloat(candles[i].low);
    const prevHigh=parseFloat(candles[i-1].high);
    const prevLow=parseFloat(candles[i-1].low);
    const prevClose=parseFloat(candles[i-1].close);
    const upMove = high-prevHigh;
    const downMove = prevLow-low;
    const plusDM = (upMove>downMove && upMove>0)?upMove:0;
    const minusDM = (downMove>upMove && downMove>0)?downMove:0;
    const tr = Math.max(high-low, Math.abs(high-prevClose), Math.abs(low-prevClose));
    trSum += tr; plusDMsum += plusDM; minusDMsum += minusDM;
  }
  const plusDI = 100*(plusDMsum/trSum);
  const minusDI = 100*(minusDMsum/trSum);
  return Math.abs(plusDI-minusDI)/(plusDI+minusDI)*100;
}

// Tendência simples
function analisarTendencia(closes){
  const c0=closes[closes.length-1], c1=closes[closes.length-2], c2=closes[closes.length-3];
  if(c0>c1 && c1>c2) return "CALL";
  if(c0<c1 && c1<c2) return "PUT";
  return c0>c1?"CALL":"PUT";
}

// Combina indicadores
function combinarIndicadores(closes, candles){
  const tend = analisarTendencia(closes);
  const media = sma(closes);
  const r = rsi(closes);
  const m = macd(closes);
  const bb = bollinger(closes);
  const a = adx(candles);

  let score=0;
  score += (tend==="CALL")?1:-1;
  score += (closes[closes.length-1]>media)?1:-1;
  score += (r>30 && r<70)?((tend==="CALL")?1:-1):((tend==="CALL")?-1:1);
  score += (m>0)?1:-1;
  score += (closes[closes.length-1]>bb.upper)?-1:(closes[closes.length-1]<bb.lower)?1:0;
  score += (a>20)?1:0;

  const sinalFinal = score>=0?"CALL":"PUT";

  return {
    sinal:sinalFinal,
    media:media.toFixed(4),
    rsi:r.toFixed(2),
    macd:m.toFixed(4),
    bbUpper:bb.upper.toFixed(4),
    bbLower:bb.lower.toFixed(4),
    adx:a.toFixed(2),
    confianca:Math.min(Math.abs(score),6)
  };
}

// Próximo candle
function proximoCandle(tempo){
  const agora=new Date(); let minutos=agora.getMinutes();
  if(tempo==="1min") minutos+=1;
  if(tempo==="5min") minutos = 5*Math.ceil(minutos/5);
  if(tempo==="15min") minutos = 15*Math.ceil(minutos/15);
  const entrada = new Date(agora); entrada.setMinutes(minutos); entrada.setSeconds(0); entrada.setMilliseconds(0);
  return entrada;
}

// Gera sinais e sincroniza timeframes
async function gerarSinaisEURUSD(){
  let infoText=""; let sinais=[];
  let sinaisTF = [];

  for(let i=0;i<tempos.length;i++){
    const tempo=tempos[i]; const id=ids[i]; const elemento=document.getElementById(id);
    try{
      const url=`https://api.twelvedata.com/time_series?symbol=EUR/USD&interval=${tempo}&outputsize=100&apikey=${API_KEY}`;
      const res=await fetch(url); const data=await res.json();
      if(!data.values || data.values.length<26) continue;

      const candles = data.values.slice(-100);
      const closes = candles.map(c=>parseFloat(c.close));
      const ind = combinarIndicadores(closes, candles);

      elemento.className="sinal "+(ind.sinal==="CALL"?"call":"put");
      elemento.innerText=`${ind.sinal} (${tempo})`;

      const entrada = proximoCandle(tempo);
      sinais.push({...ind,tempo,entrada});
      sinaisTF.push(ind.sinal);

      infoText += `${tempo.toUpperCase()} → ${ind.sinal} às ${entrada.getHours().toString().padStart(2,"0")}:${entrada.getMinutes().toString().padStart(2,"0")} | SMA:${ind.media} RSI:${ind.rsi} MACD:${ind.macd} BB:${ind.bbLower}-${ind.bbUpper} ADX:${ind.adx} | Conf:${ind.confianca}/6\n`;
    }catch(err){ console.error("Erro gerar sinal:",err); }
  }

  document.getElementById("info_eurusd").innerText=infoText;

  // Sinal sincronizado: só se os 3 timeframes concordarem
  if(sinaisTF.length===3 && sinaisTF.every(v=>v===sinaisTF[0])){
    melhorSinalAtual = sinais[0]; // pegamos qualquer, todos iguais
    document.getElementById("melhor_timeframe").innerText=`Melhor sinal sincronizado: ${melhorSinalAtual.sinal} às ${melhorSinalAtual.entrada.getHours().toString().padStart(2,"0")}:${melhorSinalAtual.entrada.getMinutes().toString().padStart(2,"0")} (Confiabilidade ${melhorSinalAtual.confianca}/6)`;
    tocarSom();
  } else {
    document.getElementById("melhor_timeframe").innerText="Sem consenso entre os timeframes";
    melhorSinalAtual = null;
  }
}

// Timer regressivo
function atualizarTimer(){
  if(!melhorSinalAtual) return;
  const agora=new Date();
  const diff=Math.max(0, Math.floor((melhorSinalAtual.entrada.getTime()-agora.getTime())/1000));
  const min=Math.floor(diff/60).toString().padStart(2,"0");
  const seg=(diff%60).toString().padStart(2,"0");
  document.getElementById("timer_entrada").innerText=`Entrada em: ${min}:${seg}`;
}

setInterval(atualizarTimer,1000);
gerarSinaisEURUSD();
</script>

</body>
</html>
