<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sala de Sinais EUR/USD Inteligente - Sincronizado</title>
<style>
  body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
  h1 { margin:20px; }
  .card { background:#1e293b; padding:20px; border-radius:15px; margin:20px auto; width:350px; }
  .sinal { font-size:28px; margin:10px 0; }
  .call { color:#00ff88; }
  .put { color:#ff3b3b; }
  .btn { margin-top:15px; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-size:16px; background:#00aaff; color:white; }
  .btn:hover { opacity:0.8; }
  .signal-info { font-size:16px; margin-top:10px; line-height:1.4; white-space:pre-line; }
  .best { background:#00ff88; color:#0f172a; font-weight:bold; padding:10px; border-radius:12px; margin-top:15px; }
</style>
</head>
<body>

<h1>🔥 Sala de Sinais EUR/USD Inteligente</h1>

<div class="card">
  <h3>EUR/USD</h3>
  <div id="eurusd_m1" class="sinal">...</div>
  <div id="eurusd_m5" class="sinal">...</div>
  <div id="eurusd_m15" class="sinal">...</div>
  <button class="btn" onclick="gerarSinaisEURUSD()">Atualizar Sinais</button>
  <div id="info_eurusd" class="signal-info"></div>
  <div id="melhor_timeframe" class="best">Melhor timeframe: ...</div>
  <div id="timer_entrada" class="signal-info"></div>
</div>

<script>
const API_KEY = "b7a8442395824a299190dc6f20845d6a";
const tempos = ["1min","5min","15min"];
const ids = ["eurusd_m1","eurusd_m5","eurusd_m15"];
let melhorSinalAtual = null;

// 🔔 Som
function tocarSom(){ const audio=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3"); audio.play(); }

// Indicadores
function sma(values){ return values.reduce((a,b)=>a+b,0)/values.length; }
function rsi(values){
  let gains=0, losses=0;
  for(let i=1;i<values.length;i++){
    const diff=values[i]-values[i-1];
    if(diff>0) gains+=diff; else losses-=diff;
  }
  if(gains+losses===0) return 50;
  return 100-(100/(1+gains/losses));
}
function macd(values,fast=3,slow=6){
  if(values.length<slow) return 0;
  return sma(values.slice(0,fast))-sma(values.slice(0,slow));
}
function analisarTendencia(closes){
  if(closes.length<3) return closes[0]>closes[1]?"CALL":"PUT";
  const [c0,c1,c2]=closes;
  if(c0>c1 && c1>c2) return "CALL";
  if(c0<c1 && c1<c2) return "PUT";
  return c0>c1?"CALL":"PUT";
}
function combinarIndicadores(closes){
  const tend=analisarTendencia(closes);
  const media=sma(closes);
  const r=rsi(closes);
  const m=macd(closes);
  let sinal=tend;
  if(tend==="CALL" && (closes[0]<media || r>70 || m<0)) sinal="PUT";
  if(tend==="PUT" && (closes[0]>media || r<30 || m>0)) sinal="CALL";
  let confianca=0;
  if(sinal===tend) confianca++;
  if((sinal==="CALL" && closes[0]>media) || (sinal==="PUT" && closes[0]<media)) confianca++;
  if((sinal==="CALL" && r<70) || (sinal==="PUT" && r>30)) confianca++;
  if((sinal==="CALL" && m>0) || (sinal==="PUT" && m<0)) confianca++;
  return {sinal,media:r.toFixed(1),rsi:r.toFixed(1),macd:m.toFixed(4),confianca};
}

// Calcula próximo candle da corretora
function proximoCandle(tempo){
  const agora = new Date();
  let minutos = agora.getMinutes();
  if(tempo==="1min") minutos = minutos + 1;
  if(tempo==="5min") minutos = 5*Math.ceil(minutos/5);
  if(tempo==="15min") minutos = 15*Math.ceil(minutos/15);
  const entrada = new Date(agora);
  entrada.setMinutes(minutos);
  entrada.setSeconds(0);
  entrada.setMilliseconds(0);
  return entrada;
}

// Gera sinais e identifica o melhor timeframe
async function gerarSinaisEURUSD(){
  let infoText="";
  let sinais=[];

  for(let i=0;i<tempos.length;i++){
    const tempo=tempos[i];
    const id=ids[i];
    const elemento=document.getElementById(id);

    try{
      const url=`https://api.twelvedata.com/time_series?symbol=EUR/USD&interval=${tempo}&outputsize=6&apikey=${API_KEY}`;
      const res=await fetch(url);
      const data=await res.json();
      if(!data.values || data.values.length<3) continue;

      const closes=data.values.slice(0,6).map(c=>parseFloat(c.close));
      const ind=combinarIndicadores(closes);
      elemento.className="sinal "+(ind.sinal==="CALL"?"call":"put");
      elemento.innerText=`${ind.sinal} (${tempo})`;

      const entrada = proximoCandle(tempo);
      sinais.push({...ind,tempo,entrada});

      infoText+=`${tempo.toUpperCase()} → ${ind.sinal} às ${entrada.getHours().toString().padStart(2,"0")}:${entrada.getMinutes().toString().padStart(2,"0")} | SMA:${ind.media} RSI:${ind.rsi} MACD:${ind.macd}\n`;
    }catch(err){ console.error("Erro gerar sinal:",err); }
  }

  document.getElementById("info_eurusd").innerText=infoText;

  if(sinais.length>0){
    sinais.sort((a,b)=>b.confianca-a.confianca);
    melhorSinalAtual=sinais[0];
    document.getElementById("melhor_timeframe").innerText=`Melhor timeframe: ${melhorSinalAtual.tempo.toUpperCase()} → ${melhorSinalAtual.sinal} às ${melhorSinalAtual.entrada.getHours().toString().padStart(2,"0")}:${melhorSinalAtual.entrada.getMinutes().toString().padStart(2,"0")} (confiabilidade ${melhorSinalAtual.confianca}/4)`;
    tocarSom();
  }
}

// Timer regressivo
function atualizarTimer(){
  if(!melhorSinalAtual) return;
  const agora=new Date();
  const diff=Math.max(0, Math.floor((melhorSinalAtual.entrada.getTime()-agora.getTime())/1000));
  const min=Math.floor(diff/60).toString().padStart(2,"0");
  const seg=(diff%60).toString().padStart(2,"0");
  document.getElementById("timer_entrada").innerText=`Entrada em: ${min}:${seg}`;
}

setInterval(atualizarTimer,1000);

// Primeira execução automática
gerarSinaisEURUSD();
</script>

</body>
</html>
